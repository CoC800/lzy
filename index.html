<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高考录取喜报｜终极动态版</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Microsoft YaHei", sans-serif;
}

body {
  min-height: 100vh;
  background: linear-gradient(-45deg, #0b1226, #1e2a5a, #3a1c71, #654ea3);
  background-size: 500% 500%;
  animation: bgMove 10s ease infinite;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* 背景无限流动 */
@keyframes bgMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* 漂浮星星 */
.star {
  position: absolute;
  background: white;
  border-radius: 50%;
  animation: starFloat 15s linear infinite;
  z-index: 1;
}
.s1 { width: 3px; height: 3px; top: 10%; left: 5%; }
.s2 { width: 2px; height: 2px; top: 30%; left: 80%; animation-delay: 2s; }
.s3 { width: 4px; height: 4px; top: 60%; left: 20%; animation-delay: 5s; }
.s4 { width: 2px; height: 2px; top: 80%; left: 70%; animation-delay: 7s; }
@keyframes starFloat {
  0% { transform: translateY(0) rotate(0); opacity: 0.2; }
  50% { opacity: 1; }
  100% { transform: translateY(-800px) rotate(180deg); opacity: 0; }
}

/* 主标题 3D 发光 + 呼吸 */
.title {
  font-size: 46px;
  color: #fff;
  text-shadow: 0 0 10px #fff, 0 0 25px #ffd700, 0 0 40px #ff9800;
  margin-bottom: 15px;
  letter-spacing: 5px;
  animation: glowPulse 2.5s infinite alternate;
  z-index: 10;
}
@keyframes glowPulse {
  from { transform: scale(1); text-shadow: 0 0 10px #ffd700; }
  to { transform: scale(1.04); text-shadow: 0 0 30px #ffd700, 0 0 50px #ff9100; }
}

/* 文字横向无限滚动 */
.marquee {
  width: 100%;
  overflow: hidden;
  white-space: nowrap;
  margin: 10px 0 40px;
  z-index: 10;
}
.marquee p {
  display: inline-block;
  color: #ffd700;
  font-size: 20px;
  letter-spacing: 2px;
  animation: marqueeMove 12s linear infinite;
}
@keyframes marqueeMove {
  0% { transform: translateX(100%); }
  100% { transform: translateX(-100%); }
}

/* 超级动态按钮 */
#openBtn {
  padding: 22px 60px;
  font-size: 24px;
  font-weight: bold;
  border: none;
  border-radius: 100px;
  background: linear-gradient(90deg, #ff512f, #f09819, #ff512f);
  background-size: 300% 100%;
  color: #fff;
  cursor: pointer;
  box-shadow: 0 0 30px rgba(255,140,0,0.6), 0 10px 30px rgba(0,0,0,0.4);
  animation: btnFlow 3s linear infinite, btnFloat 3s ease-in-out infinite;
  transition: 0.4s;
  z-index: 10;
}
@keyframes btnFlow {
  0% { background-position: 0% center; }
  100% { background-position: 300% center; }
}
@keyframes btnFloat {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
#openBtn:hover {
  transform: scale(1.15) translateY(-10px);
  box-shadow: 0 0 50px rgba(255,165,0,1);
}

/* 弹窗遮罩 */
.mask {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(12px);
  z-index: 999;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

/* 3D卡片弹窗 */
.card {
  width: min(93%, 800px);
  max-height: 90vh;
  background: linear-gradient(160deg, #fff9e6, #fffced);
  border-radius: 24px;
  padding: 50px 40px;
  border: 5px double #d4af37;
  box-shadow: 0 0 60px rgba(212,175,55,0.5), 0 20px 60px rgba(0,0,0,0.3);
  position: relative;
  transform: translateY(100px) rotateY(-20deg) scale(0.7);
  opacity: 0;
  transition: 1s cubic-bezier(0.19,1,0.22,1);
  overflow-y: auto;
}
.mask.show .card {
  transform: translateY(0) rotateY(0) scale(1);
  opacity: 1;
}

/* 关闭按钮 */
.close {
  position: absolute;
  top: 20px;
  right: 25px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 2px solid #d4af37;
  background: transparent;
  font-size: 22px;
  color: #a40000;
  cursor: pointer;
  transition: 0.3s;
}
.close:hover {
  background: #d4af37;
  color: white;
  transform: rotate(90deg);
}

/* ========== 九宫格图片样式（不轮播、不滚动、同时显示） ========== */
.grid-box {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin: 25px 0;
}
.grid-box img {
  width: 100%;
  height: 110px;
  object-fit: cover;
  border-radius: 10px;
  border: 2px solid #d4af37;
}

/* 文字逐行上浮渐入 + 流动发光 */
.text-flow {
  font-size: 20px;
  line-height: 2.1;
  color: #111;
  text-align: justify;
  position: relative;
  animation: textUp 2s ease forwards;
}
@keyframes textUp {
  from { opacity: 0; transform: translateY(40px); }
  to { opacity: 1; transform: translateY(0); }
}

.highlight {
  color: #a40000;
  font-weight: bold;
  font-size: 24px;
  background: linear-gradient(90deg, #ff6b6b, #ffd700);
  -webkit-background-clip: text;
  color: transparent;
  background-size: 200% 100%;
  animation: textShine 3s linear infinite;
}
@keyframes textShine {
  0% { background-position: 0% center; }
  100% { background-position: 200% center; }
}

/* 分享链接 */
.share {
  margin-top: 40px;
  padding-top: 20px;
  border-top: 1px dashed #d4af37;
}
#link {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: 1px solid #ccc;
  background: #fafafa;
  font-size: 15px;
  margin-bottom: 12px;
}
#copy {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 10px;
  background: #26d0ce;
  color: white;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}
#copy:hover {
  background: #1aadb8;
  transform: scale(1.03);
}

/* 底部小字 */
.foot {
  position: absolute;
  bottom: 20px;
  color: rgba(255,255,255,0.5);
  font-size: 14px;
  z-index: 5;
}
</style>
</head>

<body>
<!-- 星星装饰 -->
<div class="star s1"></div>
<div class="star s2"></div>
<div class="star s3"></div>
<div class="star s4"></div>

<h1 class="title">高考录取喜报</h1>

<div class="marquee">
  <p>金榜题名｜前程似锦｜未来可期｜学业有成｜一帆风顺</p>
</div>

<button id="openBtn">点开解锁录取祝福</button>
<p class="foot">复制链接可分享给好友查看</p>

<!-- 弹窗 -->
<div class="mask" id="mask">
  <div class="card">
    <button class="close" id="close">×</button>
    <h1 style="text-align:center; color:#a40000; margin-bottom:25px; letter-spacing:3px;">金榜题名 · 录取通知书</h1>

    <!-- ====================== 九宫格 9张图 ====================== -->
    <div class="grid-box">
      <img src="img/1734247606223.webp" alt="图1">
      <img src="img/IMG_20240925_170651.jpg" alt="图2">
      <img src="img/IMG_20240925_170657.jpg" alt="图3">
      <img src="img/IMG_20240925_170721.jpg" alt="图4">
      <img src="img/IMG_20241102_110336.jpg" alt="图5">
      <img src="img/IMG_20241110_152452.jpg" alt="图6">
      <img src="img/IMG_20240919_162939.jpg" alt="图7">
    </div>
    <!-- ======================================================= -->

    <div class="text-flow">
      恭喜程杏茹成功通过<b>高考</b>，正式被<span class="highlight">心仪理想大学</span>录取！
      <br><br>
      十年寒窗，一朝绽放，无数个日夜的坚持与奋斗，终于换来今日的金榜题名。
      提前批录取，是对你努力最好的证明，更是人生新篇章的开始。
      <br><br>
      愿你在大学的校园里，学识精进、眼界开阔、心怀热爱、奔赴山海。
      前路浩浩荡荡，万事尽可期待，前程璀璨，未来闪闪发光！
      <br><br>
      谨以此信，送上最热烈、最真挚的升学祝福！
    </div>

    <div style="text-align:right; margin-top:30px; font-size:18px;">
      致金榜题名的你
    </div>

    <div class="share">
      <input type="text" id="link" readonly>
      <button id="copy">复制分享链接</button>
    </div>
  </div>
</div>

<script>
const openBtn = document.getElementById('openBtn');
const mask = document.getElementById('mask');
const close = document.getElementById('close');
const link = document.getElementById('link');
const copy = document.getElementById('copy');

link.value = window.location.href;

openBtn.onclick = () => {
  mask.style.display = 'flex';
  setTimeout(()=>mask.classList.add('show'),30);
}

close.onclick = () => {
  mask.classList.remove('show');
  setTimeout(()=>mask.style.display='none',700);
}

mask.onclick = (e)=>{
  if(e.target===mask){
    mask.classList.remove('show');
    setTimeout(()=>mask.style.display='none',700);
  }
}

copy.onclick = async ()=>{
  await navigator.clipboard.writeText(link.value);
  alert('链接复制成功！发给好友即可查看');
}
</script>
</body>
</html>
