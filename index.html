<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关于我的女孩 - 梓怡</title>
    <style>
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(120deg, #fdfbfb 0%, #ebedee 100%);
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }

        .card {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: 1px solid #eee;
        }

        h1 {
            color: #e09f9f;
            font-size: 28px;
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }

        .intro {
            font-size: 18px;
            margin: 15px 0;
            color: #555;
        }

        .highlight {
            color: #e09f9f;
            font-weight: bold;
        }

        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 14px;
            color: #999;
        }

        /* 爱心装饰 */
        .heart {
            color: #ff6b6b;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>📖 关于她：林梓怡</h1>
    
    <p class="intro">
        她是我的<span class="highlight">最喜欢的女孩</span>，也是马年里最幸运的礼物
    </p >

    <p class="intro">
        <span class="heart">❤</span> <b>名字</b>：林梓怡<br>
        一个名字里带着梓的女孩，温柔又体贴
    </p >

    <p class="intro">
        <span class="heart">❤</span> <b>特质</b>：<br>
        像阳光一样温暖，不过总是调皮捣蛋，
        在我眼里，她善良、可爱，拥有治愈一切的魔力
    </p >

    <p class="intro">
        <span class="heart">❤</span> <b>专属代号</b>：<br>
        在我心里，她是永远值得被宠爱的<span class="highlight">小公主</span>
    </p >

    <p class="intro">
        <span class="heart">❤</span> <b>马年誓言</b>：<br>
        愿林梓怡，马年<span class="highlight">马不停蹄</span>地快乐！
        愿我们岁岁相伴，见面可期，未来每一步都有我陪着
    </p >

    <div class="footer">
        Made with ❤ by Liu Ke | 2026 丙午马年
    </div>
</div>

</body>
</html>
